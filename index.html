<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>Đồ án VR: Trái Đất Tan Chảy - Quốc PTIT</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://unpkg.com/aframe-event-set-component@5.0.0/dist/aframe-event-set-component.min.js"></script>

  <script>
    // --- 1. ĐĂNG KÝ CUSTOM SHADER CHO HIỆU ỨNG TAN CHẢY ---
    // Shader này sẽ thay đổi màu sắc và độ trong suốt của Trái Đất dựa trên một biến 'melt'
    AFRAME.registerShader('melting-earth', {
      schema: {
        src: { type: 'map', is: 'uniform' },         // Texture Trái Đất
        melt: { type: 'float', is: 'uniform', default: 0.0 }, // Mức độ tan chảy (0.0 -> 1.0)
        time: { type: 'time', is: 'uniform' }        // Thời gian để tạo hiệu ứng nhấp nháy
      },

      // Vertex Shader (Giữ nguyên vị trí các điểm)
      vertexShader: `
          varying vec2 vUv;
          void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `,

      // Fragment Shader (Xử lý màu sắc và tan chảy)
      fragmentShader: `
          varying vec2 vUv;
          uniform sampler2D src;
          uniform float melt;
          uniform float time;

          // Hàm tạo nhiễu ngẫu nhiên
          float rand(vec2 co){
              return fract(sin(dot(co.xy ,vec2(12.9898,78.233))) * 43758.5453);
          }

          void main() {
            vec4 texColor = texture2D(src, vUv);
            
            // Màu nham thạch (Vàng cam)
            vec3 lavaColor = vec3(1.0, 0.4, 0.0);
            
            // Tạo nhiễu dựa trên vị trí và thời gian để vết tan chảy không đều
            float noise = rand(vUv + time * 0.0001);
            
            // Ngưỡng tan chảy (vùng nào bị ảnh hưởng)
            float meltThreshold = 1.0 - melt;
            
            // Hiệu ứng phát sáng nham thạch mạnh hơn
            if (noise > meltThreshold) {
              float pulse = sin(time * 0.005 + noise * 10.0) * 0.5 + 0.5;
              // Tăng độ rực rỡ cho màu dung nham
              vec3 glowLava = lavaColor * (1.5 + pulse * 0.8);
              gl_FragColor = vec4(mix(texColor.rgb, glowLava, melt), texColor.a * (1.0 - melt * 0.5));
            } else {
              gl_FragColor = texColor;
            }
          }
        `
    });
    
    // --- 2. CUSTOM SHADER CHO KHÍ QUYỂN (ATMOSPHERE) ---
    AFRAME.registerShader('atmosphere', {
      schema: {
        color: {type: 'color', default: '#5d91ff'},
        powRGB: {type: 'float', default: 2.0}
      },
      vertexShader: `
        varying vec3 vNormal;
        varying vec3 vViewPosition;
        void main() {
          vNormal = normalize( normalMatrix * normal );
          vec4 mvPosition = modelViewMatrix * vec4( position, 1.0 );
          vViewPosition = -mvPosition.xyz;
          gl_Position = projectionMatrix * mvPosition;
        }
      `,
      fragmentShader: `
        varying vec3 vNormal;
        varying vec3 vViewPosition;
        uniform vec3 color;
        uniform float powRGB;
        void main() {
          float intensity = pow( 0.7 - dot( vNormal, normalize( vViewPosition ) ), powRGB );
          gl_FragColor = vec4( color, intensity );
        }
      `
    });

    // --- 2. CUSTOM SIMPLE PARTICLE SYSTEM ---
    AFRAME.registerComponent('simple-particles', {
      schema: {
        color: { type: 'color', default: '#FF4500' },
        count: { type: 'int', default: 15 }
      },
      init: function () {
        this.particlePool = [];
        for (let i = 0; i < this.data.count; i++) {
          const p = document.createElement('a-sphere');
          p.setAttribute('radius', 0.03);
          p.setAttribute('color', this.data.color);
          p.setAttribute('visible', false);
          p.setAttribute('material', 'shader: flat; transparent: true; opacity: 1');
          this.el.appendChild(p);
          this.particlePool.push({
            el: p,
            velocity: new THREE.Vector3(),
            life: 0
          });
        }
      },
      emit: function (position) {
        this.particlePool.forEach(p => {
          if (p.life <= 0) {
            p.el.setAttribute('position', position);
            p.el.setAttribute('visible', true);
            p.el.setAttribute('material', 'opacity', 1);
            p.velocity.set(
              (Math.random() - 0.5) * 0.05,
              Math.random() * 0.05 + 0.02,
              (Math.random() - 0.5) * 0.05
            );
            p.life = 1.0;
          }
        });
      },
      tick: function (time, timeDelta) {
        this.particlePool.forEach(p => {
          if (p.life > 0) {
            p.life -= timeDelta * 0.002;
            if (p.life <= 0) {
              p.el.setAttribute('visible', false);
            } else {
              const pos = p.el.getAttribute('position');
              p.el.setAttribute('position', {
                x: pos.x + p.velocity.x,
                y: pos.y + p.velocity.y,
                z: pos.z + p.velocity.z
              });
              p.el.setAttribute('material', 'opacity', p.life);
            }
          }
        });
      }
    });

    // --- 3. HỆ THỐNG ĐIỀU KHIỂN LASER & TAN CHẢY ---
    AFRAME.registerComponent('laser-melt-logic', {
      init: function () {
        this.isMelting = false;
        this.meltValue = 0.0;
        this.earthEl = document.querySelector('#earth');
        this.particlesEl = document.querySelector('#melt-particles');
        this.isIntersecting = false;
        // Lắng nghe sự kiện khi laser chiếu vào Trái Đất
        this.el.addEventListener('raycaster-intersection', (evt) => {
          if (evt.detail.els.includes(this.earthEl)) {
            this.isMelting = true;
            this.isIntersecting = true;
          }
        });

        // Lắng nghe sự kiện khi laser rời khỏi Trái Đất
        this.el.addEventListener('raycaster-intersection-cleared', (evt) => {
          this.isMelting = false;
          this.isIntersecting = false;
        });
      },

      // Chạy mỗi khung hình
      tick: function (time, timeDelta) {
        // 1. Logic tan chảy (giữ nguyên)
        if (this.isMelting && this.meltValue < 1.0) {
          this.meltValue += timeDelta * 0.0002;
        } else if (!this.isMelting && this.meltValue > 0.0) {
          this.meltValue -= timeDelta * 0.0001;
        }

        if (this.earthEl.getObject3D('mesh')) {
          this.earthEl.setAttribute('material', 'melt', this.meltValue);
        }

        // 2. Cập nhật vị trí điểm va chạm cho hạt
        if (this.isIntersecting) {
          const raycaster = this.el.components.raycaster;
          const intersection = raycaster.getIntersection(this.earthEl);

          if (intersection) {
            const hitPoint = intersection.point;
            // Gọi hàm phát hạt
            if (this.particlesEl.components['simple-particles']) {
              this.particlesEl.components['simple-particles'].emit(hitPoint);
            }
          }
        }
      }
    });
  </script>
  <script>
    // --- 3. FAIL-SAFE: TỰ ĐỘNG ẨN MÀN HÌNH LOADING NẾU BỊ KẸT ---
    window.addEventListener('load', () => {
      setTimeout(() => {
        const scene = document.querySelector('a-scene');
        if (scene && scene.hasAttribute('loading-screen')) {
          scene.setAttribute('loading-screen', 'enabled', false);
        }
        // Một số phiên bản A-Frame dùng style trực tiếp trên body hoặc canvas
        const loadingScreen = document.querySelector('.a-loader-title');
        if (loadingScreen) {
          loadingScreen.style.display = 'none';
        }
      }, 12000); // Sau 12 giây sẽ tự động tắt loading
    });
  </script>
</head>

<body style="background-color: black;">

  <a-scene>

    <a-assets timeout="10000">
      <img id="earth-map" src="./8k_earth_daymap.jpg" crossorigin="anonymous">
      <img id="cloud-map" src="./8k_earth_clouds.jpg" crossorigin="anonymous">
      <img id="star-map" src="./8k_stars.jpg" crossorigin="anonymous">
    </a-assets>

    <a-sky src="#star-map" rotation="0 -90 0"></a-sky>

    <a-entity id="earth-system" position="0 1.5 -3" rotation="0 0 23.5">

      <!-- Trái Đất -->
      <a-sphere id="earth" radius="1" material="shader: melting-earth; src: #earth-map; melt: 0.0;" segments-height="64"
        segments-width="64" animation="property: rotation; to: 0 360 0; loop: true; dur: 45000; easing: linear">
      </a-sphere>

      <!-- Lớp Mây -->
      <a-sphere id="clouds" radius="1.015" src="#cloud-map" transparent="true" opacity="0.5"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 35000; easing: linear">
      </a-sphere>

      <!-- HIỆU ỨNG KHÍ QUYỂN (Atmosphere) -->
      <a-sphere id="atmosphere" radius="1.08" material="shader: atmosphere; color: #4fa3ff; powRGB: 3.0;"
        transparent="true" side="back">
      </a-sphere>

    </a-entity>

    <!-- HỆ THỐNG HẠT TỰ CHẾ (STABLE) -->
    <a-entity id="melt-particles" simple-particles="color: #FF8c00; count: 20"></a-entity>


    <!-- ÁNH SÁNG CẢI THIỆN -->
    <!-- Mặt trời: Sáng hơn, ấm hơn -->
    <a-light type="directional" position="10 10 10" color="#fff5d1" intensity="1.5" target="#earth-system"></a-light>
    <!-- Ánh sáng môi trường: Màu xanh sâu thẳm -->
    <a-light type="ambient" color="#1a237e" intensity="0.4"></a-light>
    <!-- Một chút ánh sáng hắt từ bên dưới -->
    <a-light type="point" position="-5 -3 -2" color="#3f51b5" intensity="0.5"></a-light>

    <a-entity camera look-controls wasd-controls position="0 1.6 0"></a-entity>

    <a-entity id="right-hand" laser-controls="hand: right" raycaster="objects: #earth; far: 20;" laser-melt-logic
      input-listen>

      <a-entity
        gltf-model="url(https://cdn.aframe.io/controllers/oculus/oculus-touch-controller-right.gltf)"></a-entity>
    </a-entity>

  </a-scene>
</body>

</html>
